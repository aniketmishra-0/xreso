<svg width="1000" height="1000" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="xreso normal circle logo">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(500 420) rotate(90) scale(460)">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="68%" stop-color="#F7F2FF"/>
      <stop offset="100%" stop-color="#EAE0FF"/>
    </radialGradient>
    <linearGradient id="ring" x1="170" y1="170" x2="830" y2="830" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#D8C9FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C8B3FF" stop-opacity="0.78"/>
    </linearGradient>
    <filter id="shadow" x="120" y="120" width="760" height="760" filterUnits="userSpaceOnUse">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16" result="blur"/>
      <feOffset dy="10"/>
      <feColorMatrix in="offset" type="matrix" values="0 0 0 0 0.54 0 0 0 0 0.37 0 0 0 0 0.94 0 0 0 0.15 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <filter id="textShadow" x="160" y="360" width="680" height="240" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="6" result="tBlur"/>
      <feColorMatrix in="tBlur" type="matrix" values="0 0 0 0 0.4 0 0 0 0 0.33 0 0 0 0 0.63 0 0 0 0.22 0"/>
    </filter>
  </defs>

  <circle cx="500" cy="500" r="470" fill="url(#bg)"/>
  <circle cx="500" cy="500" r="470" fill="none" stroke="url(#ring)" stroke-width="20" filter="url(#shadow)"/>
  <circle cx="500" cy="500" r="340" fill="#F8F4FF" fill-opacity="0.9" stroke="#E5DBFF" stroke-width="10"/>
  <circle cx="500" cy="500" r="250" fill="#FCFAFF" fill-opacity="0.92" stroke="#EBE2FF" stroke-width="6"/>

  <g filter="url(#textShadow)" opacity="0.24">
    <text x="500" y="526" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="220" font-weight="800" letter-spacing="-11" fill="#4B4566">xreso</text>
  </g>
  <text x="500" y="520" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="220" font-weight="800" letter-spacing="-11">
    <tspan fill="#6B7280">x</tspan><tspan fill="#F97316">r</tspan><tspan fill="#6B7280">eso</tspan>
  </text>
</svg>
