<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1923;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#g1)" rx="8"/>
  <!-- Header line -->
  <rect x="24" y="24" width="160" height="8" rx="4" fill="#4ADE80" opacity="0.6"/>
  <rect x="24" y="40" width="100" height="6" rx="3" fill="#4ADE80" opacity="0.3"/>
  <!-- Venn diagram circles -->
  <circle cx="155" cy="160" r="55" fill="none" stroke="#4ADE80" stroke-width="2" opacity="0.5"/>
  <circle cx="205" cy="160" r="55" fill="none" stroke="#4D8BFF" stroke-width="2" opacity="0.5"/>
  <circle cx="245" cy="160" r="55" fill="none" stroke="#FF4D6A" stroke-width="2" opacity="0.5"/>
  <!-- Labels -->
  <text x="132" y="163" font-family="monospace" font-size="10" fill="#4ADE80" opacity="0.7">LEFT</text>
  <text x="175" y="148" font-family="monospace" font-size="10" fill="#FBBF24" opacity="0.7">INNER</text>
  <text x="222" y="163" font-family="monospace" font-size="10" fill="#4D8BFF" opacity="0.7">RIGHT</text>
  <!-- Notes lines -->
  <rect x="24" y="240" width="200" height="5" rx="2.5" fill="#ffffff" opacity="0.08"/>
  <rect x="24" y="252" width="140" height="5" rx="2.5" fill="#ffffff" opacity="0.05"/>
</svg>
