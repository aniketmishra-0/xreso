<svg width="1000" height="1000" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="xreso circle logo">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(500 420) rotate(90) scale(460)">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="68%" stop-color="#F6F0FF"/>
      <stop offset="100%" stop-color="#E8DBFF"/>
    </radialGradient>
    <radialGradient id="depth" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(500 540) rotate(90) scale(430)">
      <stop offset="65%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.28"/>
    </radialGradient>
    <linearGradient id="outerRing" x1="180" y1="180" x2="820" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#DCCEFF" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#C7B4FF" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="innerRing" x1="300" y1="300" x2="700" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E5DBFF" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="shadow" x="120" y="120" width="760" height="760" filterUnits="userSpaceOnUse">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
      <feOffset dy="10"/>
      <feColorMatrix in="offset" type="matrix" values="0 0 0 0 0.54 0 0 0 0 0.37 0 0 0 0 0.94 0 0 0 0.18 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <filter id="textShadow" x="160" y="300" width="680" height="280" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="7" result="tBlur"/>
      <feColorMatrix in="tBlur" type="matrix" values="0 0 0 0 0.38 0 0 0 0 0.31 0 0 0 0 0.62 0 0 0 0.22 0"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="500" cy="500" r="470"/>
    </clipPath>
  </defs>

  <circle cx="500" cy="500" r="470" fill="url(#bg)"/>
  <circle cx="500" cy="500" r="470" fill="url(#depth)"/>

  <circle cx="500" cy="500" r="470" fill="none" stroke="url(#outerRing)" stroke-width="22" filter="url(#shadow)"/>
  <circle cx="500" cy="500" r="350" fill="#F8F3FF" fill-opacity="0.92" stroke="url(#innerRing)" stroke-width="12"/>
  <circle cx="500" cy="500" r="250" fill="#FCFAFF" fill-opacity="0.92" stroke="#E6DAFF" stroke-width="8"/>

  <g clip-path="url(#circleClip)">
    <g filter="url(#textShadow)" opacity="0.28">
      <text x="500" y="538" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="250" font-weight="800" letter-spacing="-12" fill="#463F61">xreso</text>
    </g>
    <text x="500" y="530" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="250" font-weight="800" letter-spacing="-12">
      <tspan fill="#6B7280">x</tspan><tspan fill="#F97316">r</tspan><tspan fill="#6B7280">eso</tspan>
    </text>
  </g>
</svg>
